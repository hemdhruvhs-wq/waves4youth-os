<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Mentor — Waves4Youth</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet" />
<style>
  :root{--coral:#FF6F61;--magenta:#D6336C;--orange:#FF9349;--gold:#F5C453;--plum:#4A1942;--plumdeep:#2E0F2A;--cream:#FFF6EC;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{min-height:100vh;font-family:'Poppins',sans-serif;color:var(--cream);display:flex;flex-direction:column;
    background:radial-gradient(1200px 600px at 85% -10%,rgba(255,147,73,.28),transparent 60%),
      radial-gradient(900px 500px at -10% 110%,rgba(214,51,108,.25),transparent 55%),
      linear-gradient(160deg,var(--plumdeep) 0%,var(--plum) 55%,#611D45 100%);}
  .glass{background:rgba(255,255,255,.07);border:1px solid rgba(255,246,236,.15);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);}
  header{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;flex-wrap:wrap;gap:10px;}
  .logo{font-weight:800;font-size:19px;letter-spacing:1px;
    background:linear-gradient(90deg,var(--gold),var(--coral),var(--magenta));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  .sub{font-size:10.5px;letter-spacing:2px;text-transform:uppercase;opacity:.75;}
  .pill{border-radius:10px;padding:8px 12px;color:var(--cream);font-family:inherit;font-size:13px;cursor:pointer;border:1px solid rgba(255,246,236,.15);background:rgba(255,255,255,.07);}
  select.pill option{color:#222;}
  main{flex:1;max-width:820px;margin:0 auto;width:100%;padding:0 14px 20px;display:flex;flex-direction:column;min-height:0;}
  h1{font-size:22px;font-weight:800;margin:8px 0 4px;}
  .grad{background:linear-gradient(90deg,var(--gold),var(--coral),var(--magenta));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  p.lead{opacity:.85;font-size:13.5px;margin-bottom:16px;max-width:560px;}
  .grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));}
  .card{border-radius:15px;padding:16px 15px;text-align:left;cursor:pointer;color:var(--cream);font-family:inherit;border-left:4px solid var(--coral);transition:transform .15s;}
  .card:hover{transform:translateY(-3px);}
  .card .k{font-size:10.5px;letter-spacing:2px;opacity:.7;text-transform:uppercase;}
  .card b{display:block;font-size:15px;font-weight:600;margin:5px 0 3px;}
  .card span{font-size:12px;opacity:.8;}
  .bar{display:flex;align-items:center;gap:9px;padding:6px 0 10px;flex-wrap:wrap;}
  .chat{border-radius:16px;flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:11px;min-height:280px;}
  .msg{max-width:86%;padding:10px 13px;font-size:13.5px;line-height:1.55;white-space:pre-wrap;}
  .msg.user{align-self:flex-end;border-radius:15px 15px 4px 15px;background:linear-gradient(135deg,var(--coral),var(--magenta));}
  .msg.ai{align-self:flex-start;border-radius:15px 15px 15px 4px;background:rgba(255,246,236,.1);}
  .listen{margin-top:6px;background:rgba(255,246,236,.12);border:none;border-radius:8px;padding:4px 10px;color:var(--cream);font-family:inherit;font-size:11px;cursor:pointer;}
  .inrow{display:flex;gap:9px;margin-top:10px;}
  .inrow input{flex:1;border-radius:11px;padding:12px 14px;color:var(--cream);font-family:inherit;font-size:14px;outline:none;background:rgba(255,255,255,.07);border:1px solid rgba(255,246,236,.15);}
  .send{background:linear-gradient(135deg,var(--orange),var(--coral));border:none;border-radius:11px;padding:0 20px;color:#fff;font-weight:600;font-family:inherit;font-size:14px;cursor:pointer;}
  .hidden{display:none !important;}
  .typing{align-self:flex-start;opacity:.7;font-size:12.5px;padding:4px;}
  #gateMsg{text-align:center;padding:70px 20px;opacity:.85;font-size:14px;}
  .note{font-size:11px;opacity:.6;margin-top:10px;text-align:center;}
</style>
</head>
<body>
<header>
  <div><div class="logo">WAVES4YOUTH</div><div class="sub" id="subTitle">AI Mentor</div></div>
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
    <button class="pill" id="voiceBtn" onclick="toggleVoice()">🔇 Voice off</button>
    <select class="pill" id="lang">
      <option value="English">English</option><option value="Hindi">हिन्दी</option>
      <option value="Marathi">मराठी</option><option value="Tamil">தமிழ்</option>
      <option value="Telugu">తెలుగు</option><option value="Bengali">বাংলা</option>
      <option value="Kannada">ಕನ್ನಡ</option><option value="Gujarati">ગુજરાતી</option>
    </select>
    <a class="pill" href="portal.html" style="text-decoration:none">← My Campus</a>
  </div>
</header>

<div id="gateMsg">Checking your student account…</div>

<main id="app" class="hidden">
  <!-- School picker -->
  <div id="pickSchool">
    <h1>Choose your <span class="grad">mentor</span>.</h1>
    <p class="lead">Live AI mentors, in your language. Two schools are online — the rest are coming soon.</p>
    <div class="grid" id="schoolGrid"></div>
  </div>

  <!-- Module picker -->
  <div id="pickModule" class="hidden">
    <div class="bar">
      <button class="pill" onclick="backToSchools()">← Schools</button>
      <div><b id="mTitle" style="font-size:15px"></b><div style="font-size:11.5px;opacity:.7" id="mSub"></div></div>
    </div>
    <div class="grid" id="moduleGrid"></div>
  </div>

  <!-- Chat -->
  <div id="chatView" class="hidden" style="flex:1;display:flex;flex-direction:column;min-height:0">
    <div class="bar">
      <button class="pill" onclick="backToModules()">← Modules</button>
      <div><b id="cTitle" style="font-size:14.5px"></b><div style="font-size:11.5px;opacity:.7" id="cSub"></div></div>
    </div>
    <div class="chat glass" id="chatBox"></div>
    <div class="inrow">
      <input id="inp" placeholder="Ask your mentor anything…" onkeydown="if(event.key==='Enter')send()" />
      <button class="send" onclick="send()">Send</button>
    </div>
    <div class="note">Mentors are AI — helpful and knowledgeable, but double-check anything critical. Be kind; learn loud. 🌊</div>
  </div>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// ——— Config ———
const MENTOR_API = "https://solar-armadillo-4814.waves4youth.deno.net";
const firebaseConfig = {
  apiKey: "AIzaSyDiT99vqJkMZ2Td81YVDTYT5W9HWz2M54o",
  authDomain: "waves4youth-4f239.firebaseapp.com",
  projectId: "waves4youth-4f239",
  storageBucket: "waves4youth-4f239.firebasestorage.app",
  messagingSenderId: "828101805925",
  appId: "1:828101805925:web:f4cd245254aed07ec9438c"
};

// ——— Curriculum (mentor briefs) ———
const SCHOOLS = [
 {
  id:"avfx", name:"Animation & VFX", emoji:"🎬", mentor:"Asha",
  intro:"the AI mentor for the School of Animation & VFX at Waves4Youth (W4Y), India's digital university for the creator economy. You are warm, encouraging, practical, and honest — like a favourite teacher who has worked in Indian animation studios",
  tagline:"From first flipbook to finished showreel",
  modules:[
   {t:"Foundations of Motion",s:"12 principles · storyboarding",b:`MODULE 1 — FOUNDATIONS OF MOTION. Goals: the 12 principles of animation (squash & stretch, anticipation, staging, straight-ahead vs pose-to-pose, follow-through, slow in/out, arcs, secondary action, timing, exaggeration, solid drawing, appeal); storyboarding basics (panels, motion arrows, shot sizes); timing vs spacing. Task: 12-frame flipbook OR 6-panel phone storyboard. Common mistakes: even spacing (robotic), skipping anticipation, comic-style storyboards. Checkpoint: explain 4 principles with Indian examples; timing vs spacing; describe their task. Free tools: paper + phone.`},
   {t:"2D Animation Lab",s:"Krita · walk cycles · lip-sync",b:`MODULE 2 — 2D ANIMATION LAB. Goals: Krita/OpenToonz or FlipaClip setup; 12 vs 24 fps; keyframes vs in-betweens; walk cycle (contact, down, passing, up); lip-sync mouth shapes A-I-U-E-O-M. Task: 5-second loop (bouncing ball with personality / flag / walk). Mistakes: no key poses planned, sliding feet, ignoring arcs. Checkpoint: keyframes vs in-betweens; 4 walk positions; describe their loop + one improvement. Free: Krita, OpenToonz, FlipaClip.`},
   {t:"Intro to 3D",s:"Blender · modeling · lighting",b:`MODULE 3 — INTRO TO 3D WITH BLENDER. Goals: navigation, object vs edit mode, primitives/extrude/loop cuts/modifiers, Principled BSDF materials, three-point lighting (key/fill/rim), camera + first Eevee render. Task: model & light a simple scene (chai stall, desk, room corner), render one image. Mistakes: skipping navigation practice (biggest quit point!), overcomplex first model, one flat light. Checkpoint: object vs edit mode; three-point lighting; describe their render. Encourage: Blender's first week is the hardest for everyone. Free: Blender (Eevee for low-end PCs).`},
   {t:"3D Animation & Rigging",s:"armatures · graph editor · weight",b:`MODULE 4 — 3D ANIMATION & RIGGING. Goals: armatures/bones, auto weights, keyframing (I key), dope sheet + graph editor easing, body mechanics (weight, balance). Task: rig simple character or use free rig (Rain/Snow from Blender Studio); animate ONE 3-5s action showing weight. Mistakes: linear robotic motion (ignoring graph editor), no anticipation, floaty movement. Checkpoint: what a rig does; how graph editor changes feel; where they added anticipation/follow-through.`},
   {t:"VFX & Compositing",s:"tracking · keying · grading",b:`MODULE 5 — VFX & COMPOSITING. Goals: compositing concept, green screen keying, camera tracking in Blender to place CG in real footage, intro particles, color grading in DaVinci Resolve free. Task: shoot 10s phone footage, composite ONE CG element with matched lighting. Mistakes: shaky untrackable footage (teach: stable + texture), mismatched light, over-grading. Checkpoint: what motion tracking does; 2 things that make composites believable; describe their shot.`},
   {t:"Portfolio & Showreel",s:"your 60-second reel",b:`MODULE 6 — PORTFOLIO & SHOWREEL (GRADUATION). Goals: curate 45-60s reel, strongest shot first AND last, copyright-safe music, 1080p H.264 export, publishing, 2-line bio, how Indian studios judge junior reels. Task (FINAL): complete showreel published online + bio. Mistakes: including everything, weak opener, >90s, Bollywood music (copyright). Checkpoint (GRADUATION): walk through reel structure shot by shot; mentor gives 2 strengths, 2 improvements, 1 next step (junior roles, freelancing, specialization).`}
  ]
 },
 {
  id:"dcc", name:"Digital Content Creation", emoji:"📱", mentor:"Meera",
  intro:"the AI mentor for the School of Digital Content Creation at Waves4Youth (W4Y), India's digital university for the creator economy. You are warm, practical and real — a creator-educator from a tier-2 town who started camera-shy and built an audience through craft and consistency. You care about students' mental health as much as their metrics, and you remind them that skill beats follower count (UGC work needs zero followers)",
  tagline:"From camera-shy to paid creator",
  modules:[
   {t:"Voice Before Views",s:"niche · pillars · your language",b:`MODULE 1 — VOICE BEFORE VIEWS. Goals: niche = knowledge x joy x audience; 3 content pillars max; analyzing WHY posts work (hook/value/emotion); regional language as ADVANTAGE. Task: one-page identity doc — niche in one sentence, 3 pillars, 10 ideas, language choice with reason. Mistakes: copying big creators, pillars too broad ("lifestyle"), defaulting to English when their strongest voice is regional. Checkpoint: niche in ONE sentence; defend language choice; pitch best 2 ideas with pillars.`},
   {t:"Phone-First Production",s:"light · audio · presence",b:`MODULE 2 — PHONE-FIRST PRODUCTION. Goals: window light > ring light > nothing; framing (eyes top third, modest headroom); Rs.500 lavalier transforms audio; on-camera energy +20%, eyes to lens; batch shooting. Task: THREE versions of the same 30s video — default, improved light+audio, improved+performance. Mistakes: shooting against window (silhouette), echo rooms, monotone reading, no batching. Checkpoint: describe 3-version differences; their light + mic setup; one performance note that helped.`},
   {t:"Hooks, Stories & Retention",s:"2-second rule · structures",b:`MODULE 3 — HOOKS, STORIES & RETENTION. Goals: 2-second hook (visual + verbal); structures: problem->agitate->solve, before->after, myth->truth; write to be SPOKEN; retention editing (cuts, captions, pattern breaks). Task: THREE posts, three hook types, one topic; compare retention. Mistakes: "Hi guys welcome back" openings, overpromising hooks, essay-scripts, caption walls. Checkpoint: recite 3 hooks; name each structure; read retention comparison honestly including flops.`},
   {t:"The System",s:"calendar · repurposing · analytics",b:`MODULE 4 — THE SYSTEM: CONSISTENCY WITHOUT BURNOUT. Goals: calendar + batching; repurpose 1 idea -> reel, carousel, caption, story, community post; weekly review of 3 numbers (retention, saves/shares, follows per reach); iterate on data not mood; mental-health guardrails (comparison, comments, rest). Task: 4-week calendar from ONE theme, 2 weeks executed, 2 weekly reviews filled. Mistakes: post daily then vanish, every post from scratch, vanity metrics, midnight hate-comment reading. Checkpoint: show calendar; one repurposing chain; one data-driven decision; personal guardrail rule.`},
   {t:"Community & Collaboration",s:"replies · collabs · owned list",b:`MODULE 5 — COMMUNITY & COLLABORATION. Goals: followers vs community (reply culture, rituals); peer collabs beat begging big accounts; going live basics; safety online (block early, never argue publicly; extra care for young/women creators); owned list (WhatsApp/email) so algorithms never own the audience. Task: ONE peer collab + ONE named ritual/series + "join my list" offer with first signups. Mistakes: broadcasting without replying, collab pitches offering nothing, no owned list. Checkpoint: what EACH side gained from collab; their ritual; owned-audience start (even 5 people counts).`},
   {t:"Monetize Like a Professional",s:"UGC · media kit · first pitch",b:`MODULE 6 — MONETIZE LIKE A PROFESSIONAL (GRADUATION). Goals: India's ladder — UGC for brands (ZERO followers needed) -> affiliate -> brand deals -> own products; media kit + rate card; reading briefs; usage rights; invoicing; skill-not-fame paths (editor, strategist, community manager). Task (FINAL): media kit + rate card + TWO spec UGC ads for real Indian brands (labeled spec) + ONE pitch actually sent. Mistakes: waiting for 10k followers, US-copied rates, no usage-rights awareness, never sending the pitch. Checkpoint (GRADUATION): present media kit, one spec ad's choices, defend rates, share sent pitch. Mentor: 2 strengths, 2 improvements, 1 next step.`}
  ]
 }
];

// ——— State ———
let school=null, moduleIdx=null, messages=[], voiceOn=false, speakingUtterance=null;
const $=(id)=>document.getElementById(id);

// ——— Auth gate ———
const fbApp = initializeApp(firebaseConfig);
onAuthStateChanged(getAuth(fbApp), (user)=>{
  if(!user){ $("gateMsg").innerHTML = 'Please <a href="login.html" style="color:var(--gold)">log in to your student account</a> to meet your mentor.'; return; }
  $("gateMsg").classList.add("hidden");
  $("app").classList.remove("hidden");
  renderSchools();
});

// ——— UI ———
function renderSchools(){
  const g=$("schoolGrid"); g.innerHTML="";
  SCHOOLS.forEach((s,i)=>{
    const d=document.createElement("button");
    d.className="card glass";
    d.innerHTML=`<div style="font-size:24px">${s.emoji}</div><b>${s.name}</b><span>${s.tagline}</span><div style="font-size:11.5px;margin-top:7px;color:var(--gold);font-weight:600">Mentor: ${s.mentor} →</div>`;
    d.onclick=()=>{school=s;showModules();};
    g.appendChild(d);
  });
  const soon=document.createElement("div");
  soon.className="card glass"; soon.style.opacity=".55"; soon.style.cursor="default";
  soon.innerHTML=`<div style="font-size:24px">🎞️ 🎮 🤖 🚀</div><b>4 more schools</b><span>Film Editing, Game Design, AI & Creative Tech, Entrepreneurship — coming online.</span>`;
  g.appendChild(soon);
}
function showModules(){
  $("pickSchool").classList.add("hidden"); $("chatView").classList.add("hidden");
  $("pickModule").classList.remove("hidden");
  $("subTitle").textContent=`School of ${school.name} · Mentor ${school.mentor}`;
  $("mTitle").textContent=`Meet ${school.mentor}`;
  $("mSub").textContent=school.tagline;
  const g=$("moduleGrid"); g.innerHTML="";
  school.modules.forEach((m,i)=>{
    const d=document.createElement("button");
    d.className="card glass";
    d.innerHTML=`<div class="k">Module ${i+1}</div><b>${m.t}</b><span>${m.s}</span>`;
    d.onclick=()=>startModule(i);
    g.appendChild(d);
  });
}
window.backToSchools=()=>{ $("pickModule").classList.add("hidden"); $("chatView").classList.add("hidden"); $("pickSchool").classList.remove("hidden"); $("subTitle").textContent="AI Mentor"; stopSpeak(); };
window.backToModules=()=>{ $("chatView").classList.add("hidden"); $("pickModule").classList.remove("hidden"); stopSpeak(); };

// ——— Mentor brain ———
const sysPrompt=()=>`You are "${school.mentor}", ${school.intro}.

THE STUDENT'S CURRENT MODULE:
${school.modules[moduleIdx].b}

RULES:
1. LANGUAGE: reply primarily in ${$("lang").value}; switch if the student switches. Keep technical terms in English as Indian industry does, explained in ${$("lang").value}.
2. Teach THIS module; tease future topics in one line max, then guide back.
3. Use Indian examples: cricket, Bollywood/regional films, chai, autos, monsoon.
4. SHORT replies: 2-5 short paragraphs or a brief list; end most replies with ONE forward-moving question.
5. CHECKPOINT MODE: when the student says they're ready (or has finished the task), run the checkpoint conversationally, ONE question at a time. Pass: congratulate clearly, say the next module is unlocked. Fail: kindly teach the gap, let them retry.
6. Never invent progress or pretend to see files; ask them to describe work in words.
7. Encourage: many W4Y students are first in their family to pursue creative careers. Be their believer, and honest about the work.`;

async function callMentor(msgs){
  const r=await fetch(MENTOR_API,{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({system:sysPrompt(),messages:msgs,max_tokens:800})});
  const data=await r.json();
  if(data.error) throw new Error(typeof data.error==="string"?data.error:(data.error.message||"API error"));
  return (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
}

async function startModule(i){
  moduleIdx=i; messages=[];
  $("pickModule").classList.add("hidden"); $("chatView").classList.remove("hidden");
  $("cTitle").textContent=`Module ${i+1}: ${school.modules[i].t}`;
  $("cSub").textContent=school.modules[i].s;
  $("chatBox").innerHTML="";
  await sendInternal(`(The student just opened Module ${i+1}: ${school.modules[i].t}. Greet them warmly in ${$("lang").value} as ${school.mentor}, say in 2-3 lines what this module covers and what they'll make, then ask one friendly question about their starting point.)`,true);
}

window.send=async()=>{
  const t=$("inp").value.trim(); if(!t) return;
  $("inp").value="";
  addMsg("user",t);
  messages.push({role:"user",content:t});
  await sendInternal(null,false);
};

async function sendInternal(hiddenPrompt,isOpening){
  const typing=document.createElement("div");
  typing.className="typing"; typing.textContent=`${school.mentor} is typing…`;
  $("chatBox").appendChild(typing); scrollChat();
  try{
    const msgs=isOpening?[{role:"user",content:hiddenPrompt}]:messages.map(m=>({role:m.role,content:m.content}));
    const reply=await callMentor(msgs);
    typing.remove();
    messages.push({role:"assistant",content:reply});
    addMsg("ai",reply);
    if(voiceOn) speak(reply);
  }catch(e){
    typing.remove();
    addMsg("ai","⚠️ Couldn't reach your mentor: "+e.message+"\nCheck your internet and try again.");
  }
}

function addMsg(kind,text){
  const d=document.createElement("div");
  d.className="msg "+kind;
  d.textContent=text;
  if(kind==="ai"){
    const b=document.createElement("button");
    b.className="listen"; b.textContent="🔊 Listen";
    b.onclick=()=>speak(text);
    d.appendChild(document.createElement("br"));
    d.appendChild(b);
  }
  $("chatBox").appendChild(d); scrollChat();
}
function scrollChat(){ const c=$("chatBox"); c.scrollTop=c.scrollHeight; }

// ——— Voice ———
const TTS={English:"en-IN",Hindi:"hi-IN",Marathi:"mr-IN",Tamil:"ta-IN",Telugu:"te-IN",Bengali:"bn-IN",Kannada:"kn-IN",Gujarati:"gu-IN"};
window.toggleVoice=()=>{
  voiceOn=!voiceOn;
  $("voiceBtn").textContent=voiceOn?"🔊 Voice on":"🔇 Voice off";
  if(!voiceOn) stopSpeak();
};
function speak(text){
  if(!("speechSynthesis" in window)) return;
  stopSpeak();
  const clean=text.replace(/[*_#`>⚠️🔊]/g,"").replace(/\s+/g," ").trim();
  const u=new SpeechSynthesisUtterance(clean);
  const code=TTS[$("lang").value]||"en-IN";
  u.lang=code;
  const vs=speechSynthesis.getVoices();
  u.voice=vs.find(v=>v.lang===code)||vs.find(v=>v.lang&&v.lang.startsWith(code.split("-")[0]))||null;
  u.rate=.95;
  speechSynthesis.speak(u);
}
function stopSpeak(){ if("speechSynthesis" in window) speechSynthesis.cancel(); }
if("speechSynthesis" in window) speechSynthesis.getVoices();
</script>
</body>
</html>
