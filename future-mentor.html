<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meet Kiran | Waves4Youth</title>
<style>
:root{ --ink:#1B1330; --muted:#6B5E7D; --paper:#FFFBF7; --card:#FFFFFF; --line:rgba(27,19,48,.09);
--grad-1:#B45CFF; --grad-2:#FF6B6B; --grad-3:#FFA35C; }
*{box-sizing:border-box;margin:0;padding:0;}
body{ background:var(--paper); color:var(--ink); font-family:-apple-system,Segoe UI,Roboto,sans-serif; }
.wrap{ max-width:640px; margin:0 auto; padding:0 20px 60px; }
header{ text-align:center; padding:50px 20px 30px; }
.kiran-avatar{ width:88px; height:88px; border-radius:50%; margin:0 auto 18px; display:flex; align-items:center; justify-content:center;
background:linear-gradient(135deg,var(--grad-1),var(--grad-2),var(--grad-3)); font-size:40px; }
h1{ font-size:26px; }
.sub{ color:var(--muted); font-size:14.5px; margin-top:8px; max-width:440px; margin-left:auto; margin-right:auto; line-height:1.5; }
.back-link{ display:inline-block; margin-top:16px; font-size:13.5px; color:var(--grad-1); text-decoration:none; }

.mw-widget{ margin-top:10px; border:1px solid var(--line); border-radius:16px; background:var(--card); overflow:hidden; box-shadow:0 12px 34px rgba(27,19,48,.06); }
.mw-header{ padding:14px 18px; font-weight:700; border-bottom:1px solid var(--line); }
.mw-lang-select{ font-size:12px; padding:5px 8px; border-radius:8px; border:1px solid var(--line); background:#fff; color:var(--ink); font-weight:500; }
.mw-messages{ min-height:220px; max-height:360px; overflow-y:auto; padding:16px 18px; display:flex; flex-direction:column; gap:10px; }
.mw-bubble{ padding:10px 14px; border-radius:14px; font-size:14px; max-width:85%; line-height:1.4; }
.mw-user{ align-self:flex-end; background:linear-gradient(90deg,var(--grad-1),var(--grad-2)); color:#fff; }
.mw-mentor{ align-self:flex-start; background:rgba(27,19,48,.05); }
.mw-input-row{ display:flex; gap:8px; padding:14px 18px; border-top:1px solid var(--line); }
.mw-input-row input{ flex:1; background:rgba(27,19,48,.04); border:1px solid var(--line); border-radius:10px; padding:10px 12px; font-size:14px; }
.mw-input-row button{ background:linear-gradient(90deg,var(--grad-1),var(--grad-2)); border:none; color:#fff; border-radius:10px; padding:10px 16px; font-weight:600; cursor:pointer; }

.suggestions{ display:flex; gap:8px; flex-wrap:wrap; margin-top:18px; justify-content:center; }
.chip{ background:rgba(180,92,255,.08); border:1px solid var(--line); border-radius:999px; padding:8px 14px; font-size:12.5px; cursor:pointer; }
</style>
</head>
<body>

<header>
<div class="kiran-avatar">✨</div>
<h1>Meet Kiran</h1>
<p class="sub">Your friendly W4Y guide — ask about any course, any Future Studio profession, or just where to start.</p>
<a class="back-link" href="index.html">← Back to W4Y Home</a>
</header>

<div class="wrap">
<div id="kiranMentor" class="mw-widget"></div>
<div class="suggestions">
<div class="chip" data-q="I don't know which course to pick, can you help?">Help me pick a course</div>
<div class="chip" data-q="What's the difference between the pricing plans?">Explain the pricing</div>
<div class="chip" data-q="What is Future Studio and how does it work?">What's Future Studio?</div>
</div>
</div>

<script type="module">
import { createMentorWidget } from "./mentor-widget.js";

createMentorWidget({
  name: "Kiran",
  persona: "You are Kiran, the friendly, warm guide mentor for Waves4Youth (W4Y) — an Indian ed-tech platform for students in Std 6-12.\n\nThere are TWO separate pricing systems on this platform — never mix them up:\n\n1) MAIN SKILL COURSES (13 courses: video editing, animation & VFX, game design, digital content, AI creative tech, entrepreneurship, interior design, fashion design, XR/immersive design, applied AI agents, robotics/drones, climate/sustainability tech, esports/streaming). Pricing: W4Y Access (Free trial), W4Y Explorer (₹199/month), W4Y Creator (₹999/month, most popular), W4Y Sprint (₹4,999 one-time, 3-month structured program), W4Y Certified (₹9,999 one-time, full year + real certificate). The first three are monthly subscriptions you can cancel anytime; the last two are one-time payments for a fixed program.\n\n2) FUTURE STUDIO (16 separate career-exploration tracks: Doctor, Engineer, CA/Finance, Entrepreneur, Law, Scientist, Pilot, Space, AI/Coding/Robotics, Gaming/Esports, Film/Animation, Civil Services, Architecture, Media, Sports, Hotel Management). Each track runs 12 months, with 4 real tasks every month (Observe, Quiz, Build, Reflect) — a full year of monthly missions per profession, earning W4Y Coins along the way. Pricing here is different from the courses above: one fixed yearly price of ₹2,999 gets a student their choice of any 3 professions; every profession beyond those 3 costs ₹999/year each, added individually. Doctor and Space also have a separate deeper paid upgrade (Explorer ₹1,999/yr or Mission Crew ₹4,999/yr) with a dedicated AI mentor and real graded missions — that upgrade is optional and separate from the base ₹2,999 plan.\n\nKeep answers short, warm, encouraging, and age-appropriate for a parent or a Std 6-12 student. Never make up specific prices or features beyond what's listed above — if asked something outside this, suggest they check the relevant page or contact support.",
  voicePref: "female",
  trackContext: "general W4Y guidance",
  containerId: "kiranMentor"
});

document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    const input = document.getElementById('kiranMentor-input');
    if (input) {
      input.value = chip.dataset.q;
      document.getElementById('kiranMentor-send').click();
    }
  });
});
</script>

</body>
</html>
