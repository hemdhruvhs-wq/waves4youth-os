<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Student Login — Waves4Youth</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet" />
<style>
  :root{--coral:#FF6F61;--magenta:#D6336C;--orange:#FF9349;--gold:#F5C453;--plum:#4A1942;--plumdeep:#2E0F2A;--cream:#FFF6EC;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{min-height:100vh;font-family:'Poppins',sans-serif;color:var(--cream);display:flex;align-items:center;justify-content:center;padding:20px;
    background:radial-gradient(1200px 600px at 85% -10%,rgba(255,147,73,.28),transparent 60%),
      radial-gradient(900px 500px at -10% 110%,rgba(214,51,108,.25),transparent 55%),
      linear-gradient(160deg,var(--plumdeep) 0%,var(--plum) 55%,#611D45 100%);}
  .card{width:100%;max-width:420px;background:rgba(255,255,255,.07);border:1px solid rgba(255,246,236,.15);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-radius:20px;padding:34px 28px;}
  .logo{font-weight:800;font-size:22px;letter-spacing:1px;text-align:center;
    background:linear-gradient(90deg,var(--gold),var(--coral),var(--magenta));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  .sub{text-align:center;font-size:11px;letter-spacing:2px;text-transform:uppercase;opacity:.75;margin:4px 0 26px;}
  h2{font-size:19px;font-weight:600;margin-bottom:18px;text-align:center;}
  label{font-size:12.5px;opacity:.85;display:block;margin:14px 0 6px;}
  input,select{width:100%;padding:12px 14px;border-radius:11px;border:1px solid rgba(255,246,236,.2);
    background:rgba(255,255,255,.08);color:var(--cream);font-family:inherit;font-size:14px;outline:none;}
  input:focus{border-color:var(--gold);}
  select option{color:#222;}
  .btn{width:100%;margin-top:22px;padding:13px;border:none;border-radius:12px;cursor:pointer;
    background:linear-gradient(135deg,var(--orange),var(--coral));color:#fff;font-family:inherit;font-weight:600;font-size:15px;}
  .btn:disabled{opacity:.6;cursor:wait;}
  .switch{margin-top:16px;text-align:center;font-size:13px;opacity:.85;}
  .switch a{color:var(--gold);cursor:pointer;text-decoration:underline;}
  .msg{margin-top:14px;font-size:13px;text-align:center;min-height:18px;}
  .msg.err{color:#FFB3A9;} .msg.ok{color:var(--gold);}
  .hidden{display:none;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">WAVES4YOUTH</div>
  <div class="sub">Student Portal</div>

  <!-- LOGIN -->
  <div id="loginBox">
    <h2>Welcome back 🌅</h2>
    <label>Email</label>
    <input id="liEmail" type="email" placeholder="you@example.com" />
    <label>Password</label>
    <input id="liPass" type="password" placeholder="••••••••" />
    <button class="btn" id="liBtn" onclick="doLogin()">Log in</button>
    <div class="switch">New student? <a onclick="show('signup')">Create your account</a></div>
    <div class="switch" style="margin-top:8px"><a onclick="show('reset')">Forgot password?</a></div>
  </div>

  <!-- SIGNUP -->
  <div id="signupBox" class="hidden">
    <h2>Join the first wave 🚀</h2>
    <label>Full name</label>
    <input id="suName" type="text" placeholder="Your name" />
    <label>Email</label>
    <input id="suEmail" type="email" placeholder="you@example.com" />
    <label>Password (min 6 characters)</label>
    <input id="suPass" type="password" placeholder="Create a password" />
    <label>Choose your school</label>
    <select id="suSchool">
      <option value="">— Select —</option>
      <option>Animation & VFX</option>
      <option>Digital Content Creation</option>
      <option>Film & Video Editing</option>
      <option>Game Design</option>
      <option>AI & Creative Tech</option>
      <option>Creator Entrepreneurship</option>
    </select>
    <button class="btn" id="suBtn" onclick="doSignup()">Create account</button>
    <div class="switch">Already enrolled? <a onclick="show('login')">Log in</a></div>
  </div>

  <!-- RESET -->
  <div id="resetBox" class="hidden">
    <h2>Reset password</h2>
    <label>Email</label>
    <input id="rsEmail" type="email" placeholder="you@example.com" />
    <button class="btn" onclick="doReset()">Send reset link</button>
    <div class="switch"><a onclick="show('login')">← Back to login</a></div>
  </div>

  <div id="msg" class="msg"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDiT99vqJkMZ2Td81YVDTYT5W9HWz2M54o",
  authDomain: "waves4youth-4f239.firebaseapp.com",
  projectId: "waves4youth-4f239",
  storageBucket: "waves4youth-4f239.firebasestorage.app",
  messagingSenderId: "828101805925",
  appId: "1:828101805925:web:f4cd245254aed07ec9438c"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const $ = (id) => document.getElementById(id);
window.show = (which) => {
  ["login","signup","reset"].forEach(b => $(b+"Box").classList.add("hidden"));
  $(which+"Box").classList.remove("hidden");
  setMsg("");
};
const setMsg = (t, ok=false) => { const m=$("msg"); m.textContent=t; m.className="msg "+(ok?"ok":"err"); };
const friendly = (e) => {
  const c = (e && e.code) || "";
  if (c.includes("invalid-credential")||c.includes("wrong-password")||c.includes("user-not-found")) return "Email or password is incorrect.";
  if (c.includes("email-already-in-use")) return "This email already has an account — try logging in.";
  if (c.includes("weak-password")) return "Password must be at least 6 characters.";
  if (c.includes("invalid-email")) return "Please enter a valid email address.";
  if (c.includes("too-many-requests")) return "Too many attempts — wait a minute and try again.";
  return "Something went wrong. Please try again.";
};

window.doLogin = async () => {
  setMsg(""); $("liBtn").disabled = true;
  try {
    await signInWithEmailAndPassword(auth, $("liEmail").value.trim(), $("liPass").value);
    location.href = "portal.html";
  } catch(e){ setMsg(friendly(e)); }
  $("liBtn").disabled = false;
};

window.doSignup = async () => {
  setMsg("");
  const name=$("suName").value.trim(), email=$("suEmail").value.trim(), pass=$("suPass").value, school=$("suSchool").value;
  if(!name||!email||!pass||!school){ setMsg("Please fill every field, including your school."); return; }
  $("suBtn").disabled = true;
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    // Student ID: W4Y- + counter-free unique suffix from uid
    const sid = "W4Y-" + cred.user.uid.slice(0,6).toUpperCase();
    await setDoc(doc(db, "students", cred.user.uid), {
      name, email, school,
      studentId: sid,
      progress: {},            // e.g. {"Animation & VFX": 2}
      paymentStatus: "Pending",
      plan: "",
      createdAt: serverTimestamp(),
      lastActive: serverTimestamp()
    });
    location.href = "portal.html";
  } catch(e){ setMsg(friendly(e)); }
  $("suBtn").disabled = false;
};

window.doReset = async () => {
  setMsg("");
  try {
    await sendPasswordResetEmail(auth, $("rsEmail").value.trim());
    setMsg("Reset link sent — check your email inbox.", true);
  } catch(e){ setMsg(friendly(e)); }
};
</script>
</body>
</html>
